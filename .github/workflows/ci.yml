name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - run: pip install uv

      - run: uv sync --extra dev

      - name: Ruff check
        run: .venv/bin/ruff check .

      - name: Ruff format check
        run: .venv/bin/ruff format --check .

  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"

      - run: pip install uv

      - run: uv sync --extra dev

      - name: Pyright type check
        run: .venv/bin/pyright

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - run: pip install uv

      - run: uv sync --extra dev

      - name: Pytest
        run: .venv/bin/pytest tests/ -v

  voice-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install voice system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev

      - run: pip install uv

      - run: uv sync --extra dev --extra voice

      - name: Voice module import smoke test
        run: .venv/bin/python -c "from clawdia.voice.listener import WakeWordListener; from clawdia.voice.stt import SpeechToText; print('ok')"

      - name: Voice pytest smoke
        run: .venv/bin/pytest --no-cov tests/test_listener.py tests/test_stt.py -v
