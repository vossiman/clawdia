name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: pip install uv

      - run: uv sync --all-extras

      - name: Ruff check
        run: .venv/bin/ruff check .

      - name: Ruff format check
        run: .venv/bin/ruff format --check .

  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - run: pip install uv

      - run: uv sync --all-extras

      - name: Pyright type check
        run: npx pyright

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: pip install uv

      - run: uv sync --all-extras

      - name: Pytest
        run: .venv/bin/pytest tests/ -v
